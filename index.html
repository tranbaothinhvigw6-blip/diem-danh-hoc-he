<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm Danh Học Hè</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f6fa;
    --card: #ffffff;
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #1a1a2e;
    --muted: #8892a4;
    --border: #e2e8f0;
    --row-alt: #f8fafc;
    --x-color: #dc2626;
    --green: #16a34a;
    --blue: #1d4ed8;
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--primary);
    color: white;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }

  /* TOOLBAR */
  .toolbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar label { font-size: 13px; font-weight: 600; color: var(--muted); }
  select, input[type=number], input[type=text] {
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 7px 12px; font-size: 13px; background: var(--bg);
    color: var(--text); outline: none; transition: border 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select { cursor: pointer; }

  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #c73652; transform: translateY(-1px); }
  .btn-secondary { background: var(--accent2); color: white; }
  .btn-secondary:hover { background: #0a2744; }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #15803d; }
  .btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #dc2626; color: white; }

  .sep { width: 1px; height: 30px; background: var(--border); }

  /* TABS (Classes) */
  .tabs-wrap {
    background: var(--card);
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex; gap: 4px; overflow-x: auto;
  }
  .tab {
    padding: 10px 20px; font-size: 13px; font-weight: 600;
    border: none; background: none; cursor: pointer; color: var(--muted);
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    white-space: nowrap; transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-add { color: var(--accent); font-size: 18px; padding: 8px 14px; }

  /* TABLE AREA */
  .main { padding: 20px 24px; }
  .table-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); }

  table { border-collapse: collapse; width: 100%; min-width: max-content; background: white; }
  thead tr:first-child th {
    background: var(--primary); color: white;
    font-size: 13px; font-weight: 700; padding: 12px 10px;
    text-align: center;
  }
  thead tr:first-child th:nth-child(2) { text-align: left; padding-left: 16px; }
  thead tr.date-row th {
    background: var(--accent2); color: white;
    font-size: 11px; font-weight: 600; padding: 8px 4px;
    text-align: center; line-height: 1.3;
  }
  thead tr.date-row th:first-child,
  thead tr.date-row th:nth-child(2) { text-align: center; }

  tbody tr { transition: background 0.1s; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: #eff6ff; }

  td { padding: 8px 6px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  td:first-child { text-align: center; color: var(--muted); font-size: 12px; width: 40px; }
  td:nth-child(2) { min-width: 160px; padding-left: 14px; font-weight: 500; }

  /* Attendance cell */
  td.att-cell { text-align: center; min-width: 44px; padding: 4px; }
  .att-btn {
    width: 34px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; font-size: 14px; font-weight: 800;
    color: transparent; transition: all 0.12s; display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  .att-btn.checked { background: #fef2f2; border-color: #fca5a5; color: var(--x-color); }
  .att-btn:hover:not(.checked) { background: #f0fdf4; border-color: #86efac; }
  .att-btn:hover.checked { background: #fee2e2; }

  td.total-cell { text-align: center; font-weight: 700; color: var(--blue); font-size: 14px; min-width: 56px; }
  td.fee-cell {
    text-align: right; font-weight: 700; color: var(--green);
    font-size: 13px; padding-right: 14px; min-width: 110px; white-space: nowrap;
  }
  td.action-cell { text-align: center; min-width: 50px; }

  tfoot td {
    background: var(--primary); color: white; font-weight: 700;
    font-size: 13px; padding: 10px 6px; border: none;
  }
  tfoot td:first-child, tfoot td:nth-child(2) { text-align: right; padding-right: 10px; }
  tfoot td.total-cell { color: #93c5fd; font-size: 15px; }
  tfoot td.fee-cell { color: #86efac; font-size: 14px; padding-right: 14px; }

  /* Info bar */
  .info-bar {
    display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .info-chip {
    background: white; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; font-size: 12px; color: var(--muted);
  }
  .info-chip strong { color: var(--text); }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 28px; width: 360px;
    max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal input, .modal select { width: 100%; margin-bottom: 12px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .student-list { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
  .student-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-radius: 6px; font-size: 13px;
  }
  .student-item:nth-child(even) { background: var(--bg); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--primary);
    color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px;
    font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 300;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .toolbar { padding: 10px 12px; }
    .main { padding: 12px; }
    .header { padding: 12px; }
    .tabs-wrap { padding: 0 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 Điểm Danh Học Hè</h1>
    <div class="subtitle">Gõ x hoặc click ô để điểm danh</div>
  </div>
  <button class="btn btn-green" onclick="exportExcel()">⬇ Xuất Excel</button>
</div>

<div class="toolbar">
  <label>Tháng</label>
  <select id="selMonth" onchange="rebuild()">
    <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
    <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
    <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
    <option value="7" selected>Tháng 7</option><option value="8">Tháng 8</option>
    <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
    <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
  </select>
  <label>Năm</label>
  <input type="number" id="selYear" value="2026" min="2020" max="2100" onchange="rebuild()" style="width:80px">
  <label>Học phí/buổi</label>
  <input type="number" id="selGia" value="25000" step="1000" onchange="renderTable()" style="width:100px">
  <span>đ</span>
  <div class="sep"></div>
  <button class="btn btn-secondary btn-sm" onclick="markAllToday()">✓ Điểm danh hôm nay</button>
</div>

<div class="tabs-wrap" id="tabs"></div>

<div class="main">
  <div class="info-bar" id="infoBar"></div>
  <div class="table-wrap">
    <table id="attTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>
</div>

<!-- Modal thêm lớp -->
<div class="modal-bg" id="modalClass">
  <div class="modal">
    <h3>➕ Thêm lớp mới</h3>
    <input type="text" id="newClassName" placeholder="Tên lớp (vd: Lớp 2, Lớp Nâng Cao...)" />
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('modalClass')">Huỷ</button>
      <button class="btn btn-primary" onclick="addClass()">Thêm lớp</button>
    </div>
  </div>
</div>

<!-- Modal quản lý học sinh -->
<div class="modal-bg" id="modalStudents">
  <div class="modal">
    <h3 id="modalStudentsTitle">👥 Quản lý học sinh</h3>
    <div class="student-list" id="studentList"></div>
    <input type="text" id="newStudentName" placeholder="Tên học sinh mới..." onkeydown="if(event.key==='Enter')addStudent()" />
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('modalStudents')">Đóng</button>
      <button class="btn btn-primary" onclick="addStudent()">➕ Thêm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  classes: {
    "Lớp 1": ["Thịnh","Từ Minh Quân","Khánh Ngân","Thiên Khôi","Tiger (Minh Trí)","Thiên Thư","Minh Triết","Thiên Trí","Khánh Linh","Thiên Quang"],
    "Lớp 3": ["Hoàng Khang","Thanh Hà","YSENNY","Jenny","Bảo Trâm","Thiên Kỳ","Quỳnh Như","Triều Phong","Thúy Kiều","Yến My"]
  },
  // attendance[class][month-year][student][dateStr] = true/false
  attendance: {},
  activeClass: "Lớp 1",
  days: []
};

// Load từ localStorage nếu có
function loadState() {
  try {
    const saved = localStorage.getItem('hocHe_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.classes = parsed.classes || state.classes;
      state.attendance = parsed.attendance || {};
      // Đảm bảo activeClass hợp lệ
      if (!state.classes[state.activeClass]) {
        state.activeClass = Object.keys(state.classes)[0];
      }
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('hocHe_state', JSON.stringify({
      classes: state.classes,
      attendance: state.attendance
    }));
  } catch(e) {}
}

// ===== DATES =====
function getSchoolDays(year, month) {
  const days = [];
  const d = new Date(year, month-1, 1);
  while (d.getMonth() === month-1) {
    if ([1,3,5].includes(d.getDay())) {
      days.push(new Date(d));
    }
    d.setDate(d.getDate()+1);
  }
  return days;
}

function fmtDate(dt) {
  const dd = String(dt.getDate()).padStart(2,'0');
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}`;
}
function fmtKey(dt) { return dt.toISOString().slice(0,10); }
function dayLabel(dt) { return ['CN','T2','T3','T4','T5','T6','T7'][dt.getDay()]; }

// ===== ATTENDANCE KEY =====
function getPeriodKey() {
  const m = document.getElementById('selMonth').value;
  const y = document.getElementById('selYear').value;
  return `${y}-${m}`;
}
function getAtt(cls, studentIdx, dateKey) {
  const k = getPeriodKey();
  return !!(state.attendance[cls] && state.attendance[cls][k] && state.attendance[cls][k][studentIdx] && state.attendance[cls][k][studentIdx][dateKey]);
}
function setAtt(cls, studentIdx, dateKey, val) {
  const k = getPeriodKey();
  if (!state.attendance[cls]) state.attendance[cls] = {};
  if (!state.attendance[cls][k]) state.attendance[cls][k] = {};
  if (!state.attendance[cls][k][studentIdx]) state.attendance[cls][k][studentIdx] = {};
  state.attendance[cls][k][studentIdx][dateKey] = val;
  saveState();
}
function countAtt(cls, studentIdx) {
  const k = getPeriodKey();
  if (!state.attendance[cls] || !state.attendance[cls][k] || !state.attendance[cls][k][studentIdx]) return 0;
  return Object.values(state.attendance[cls][k][studentIdx]).filter(Boolean).length;
}

// ===== TOGGLE ATTENDANCE =====
function toggle(studentIdx, dateKey) {
  const cur = getAtt(state.activeClass, studentIdx, dateKey);
  setAtt(state.activeClass, studentIdx, dateKey, !cur);
  renderTable();
}

// ===== MARK ALL TODAY =====
function markAllToday() {
  const today = new Date();
  const todayKey = fmtKey(today);
  const found = state.days.find(d => fmtKey(d) === todayKey);
  if (!found) { showToast('Hôm nay không có buổi học (T2/T4/T6)'); return; }
  const cls = state.activeClass;
  const students = state.classes[cls];
  students.forEach((_, i) => setAtt(cls, i, todayKey, true));
  renderTable();
  showToast(`✅ Đã điểm danh ${students.length} học sinh ngày hôm nay`);
}

// ===== RENDER TABS =====
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  Object.keys(state.classes).forEach(cls => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cls === state.activeClass ? ' active' : '');
    btn.textContent = cls;
    btn.onclick = () => { state.activeClass = cls; renderTabs(); renderTable(); };
    tabs.appendChild(btn);
  });
  // Nút thêm lớp
  const add = document.createElement('button');
  add.className = 'tab tab-add';
  add.title = 'Thêm lớp mới';
  add.textContent = '+';
  add.onclick = () => document.getElementById('modalClass').classList.add('open');
  tabs.appendChild(add);
}

// ===== RENDER TABLE =====
function renderTable() {
  const cls = state.activeClass;
  const students = state.classes[cls] || [];
  const gia = parseInt(document.getElementById('selGia').value) || 25000;
  const days = state.days;

  // Info bar
  document.getElementById('infoBar').innerHTML = `
    <div class="info-chip">📅 <strong>${days.length} buổi</strong> học tháng này</div>
    <div class="info-chip">👥 <strong>${students.length} học sinh</strong></div>
    <div class="info-chip">💰 Học phí: <strong>${gia.toLocaleString('vi-VN')}đ</strong>/buổi</div>
    <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="openStudentsModal()">✏️ Quản lý học sinh</button>
    <button class="btn btn-danger btn-sm" onclick="deleteClass()">🗑 Xoá lớp</button>
  `;

  // THEAD
  const thead = document.getElementById('thead');
  // Row 1
  let r1 = `<tr>
    <th>#</th>
    <th style="text-align:left;padding-left:16px">Họ và Tên</th>`;
  days.forEach(d => { r1 += `<th>${dayLabel(d)}<br><span style="font-weight:400;font-size:10px">${fmtDate(d)}</span></th>`; });
  r1 += `<th>Tổng</th><th style="text-align:right;padding-right:14px">Học Phí</th><th></th></tr>`;
  thead.innerHTML = r1;

  // TBODY
  const tbody = document.getElementById('tbody');
  if (students.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${3+days.length}" class="empty"><div class="icon">👤</div>Chưa có học sinh. Nhấn "Quản lý học sinh" để thêm.</td></tr>`;
    document.getElementById('tfoot').innerHTML = '';
    return;
  }

  tbody.innerHTML = students.map((name, si) => {
    const total = countAtt(cls, si);
    const fee = total * gia;
    const dateCells = days.map(d => {
      const dk = fmtKey(d);
      const checked = getAtt(cls, si, dk);
      return `<td class="att-cell">
        <button class="att-btn ${checked?'checked':''}" 
          onclick="toggle(${si},'${dk}')" 
          title="${name} – ${fmtDate(d)}">
          ${checked ? 'x' : ''}
        </button>
      </td>`;
    }).join('');
    return `<tr>
      <td>${si+1}</td>
      <td>${name}</td>
      ${dateCells}
      <td class="total-cell">${total}</td>
      <td class="fee-cell">${fee.toLocaleString('vi-VN')}đ</td>
      <td class="action-cell"></td>
    </tr>`;
  }).join('');

  // TFOOT
  const totalDays = students.reduce((s,_,i) => s + countAtt(cls,i), 0);
  const totalFee  = students.reduce((s,_,i) => s + countAtt(cls,i)*gia, 0);
  const empties = days.map(() => '<td></td>').join('');
  document.getElementById('tfoot').innerHTML = `<tr>
    <td colspan="2" style="text-align:right;padding-right:10px">TỔNG CỘNG</td>
    ${empties}
    <td class="total-cell">${totalDays}</td>
    <td class="fee-cell" style="color:#86efac">${totalFee.toLocaleString('vi-VN')}đ</td>
    <td></td>
  </tr>`;
}

// ===== REBUILD (tháng/năm thay đổi) =====
function rebuild() {
  const m = parseInt(document.getElementById('selMonth').value);
  const y = parseInt(document.getElementById('selYear').value);
  state.days = getSchoolDays(y, m);
  renderTable();
}

// ===== ADD/DELETE CLASS =====
function addClass() {
  const name = document.getElementById('newClassName').value.trim();
  if (!name) return;
  if (state.classes[name]) { showToast('Lớp đã tồn tại!'); return; }
  state.classes[name] = [];
  state.activeClass = name;
  document.getElementById('newClassName').value = '';
  closeModal('modalClass');
  saveState();
  renderTabs();
  renderTable();
  showToast(`✅ Đã thêm lớp "${name}"`);
}
function deleteClass() {
  const cls = state.activeClass;
  if (Object.keys(state.classes).length <= 1) { showToast('Phải có ít nhất 1 lớp!'); return; }
  if (!confirm(`Xoá lớp "${cls}"? Dữ liệu điểm danh sẽ mất.`)) return;
  delete state.classes[cls];
  delete state.attendance[cls];
  state.activeClass = Object.keys(state.classes)[0];
  saveState();
  renderTabs();
  renderTable();
}

// ===== MANAGE STUDENTS =====
function openStudentsModal() {
  const cls = state.activeClass;
  document.getElementById('modalStudentsTitle').textContent = `👥 Học sinh – ${cls}`;
  renderStudentList();
  document.getElementById('modalStudents').classList.add('open');
}
function renderStudentList() {
  const cls = state.activeClass;
  const list = document.getElementById('studentList');
  const students = state.classes[cls];
  if (students.length === 0) {
    list.innerHTML = '<div style="color:#94a3b8;font-size:13px;padding:8px">Chưa có học sinh</div>';
    return;
  }
  list.innerHTML = students.map((name,i) => `
    <div class="student-item">
      <span>${i+1}. ${name}</span>
      <button class="btn btn-danger btn-sm" onclick="removeStudent(${i})">✕</button>
    </div>`).join('');
}
function addStudent() {
  const inp = document.getElementById('newStudentName');
  const name = inp.value.trim();
  if (!name) return;
  state.classes[state.activeClass].push(name);
  inp.value = '';
  saveState();
  renderStudentList();
  renderTable();
}
function removeStudent(idx) {
  const cls = state.activeClass;
  const name = state.classes[cls][idx];
  if (!confirm(`Xoá học sinh "${name}"? Dữ liệu điểm danh của học sinh này cũng sẽ bị xoá.`)) return;
  state.classes[cls].splice(idx, 1);

  // Dịch lại index điểm danh cho đúng (vì các học sinh sau bị lùi 1 vị trí)
  if (state.attendance[cls]) {
    Object.keys(state.attendance[cls]).forEach(periodKey => {
      const oldData = state.attendance[cls][periodKey];
      const newData = {};
      Object.keys(oldData).forEach(key => {
        const i = parseInt(key);
        if (i < idx) newData[i] = oldData[key];
        else if (i > idx) newData[i - 1] = oldData[key];
        // i === idx -> bị xoá, không copy nữa
      });
      state.attendance[cls][periodKey] = newData;
    });
  }

  saveState();
  renderStudentList();
  renderTable();
}

// ===== EXPORT EXCEL =====
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const m = parseInt(document.getElementById('selMonth').value);
  const y = parseInt(document.getElementById('selYear').value);
  const gia = parseInt(document.getElementById('selGia').value) || 25000;
  const days = state.days;

  Object.entries(state.classes).forEach(([cls, students]) => {
    const headers = ['STT', 'Họ và Tên', ...days.map(d => `${dayLabel(d)} ${fmtDate(d)}`), 'Tổng Ngày', 'Học Phí (VNĐ)'];
    const rows = [headers];

    students.forEach((name, si) => {
      const row = [si+1, name];
      days.forEach(d => {
        // Đổi activeClass tạm để lấy att của đúng lớp
        const k = getPeriodKeyFor(m, y);
        const att = !!(state.attendance[cls] && state.attendance[cls][k] && state.attendance[cls][k][si] && state.attendance[cls][k][si][fmtKey(d)]);
        row.push(att ? 'x' : '');
      });
      const total = students.reduce ? (() => {
        const k = getPeriodKeyFor(m,y);
        if (!state.attendance[cls] || !state.attendance[cls][k] || !state.attendance[cls][k][si]) return 0;
        return Object.values(state.attendance[cls][k][si]).filter(Boolean).length;
      })() : 0;
      row.push(total);
      row.push(total * gia);
      rows.push(row);
    });

    // Tổng
    const totRow = ['', 'TỔNG CỘNG', ...days.map(()=>'')];
    const grandTotal = students.reduce((s,_,si) => {
      const k = getPeriodKeyFor(m,y);
      if (!state.attendance[cls] || !state.attendance[cls][k] || !state.attendance[cls][k][si]) return s;
      return s + Object.values(state.attendance[cls][k][si]).filter(Boolean).length;
    }, 0);
    totRow.push(grandTotal, grandTotal * gia);
    rows.push(totRow);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Định dạng cột
    ws['!cols'] = [
      {wch:5}, {wch:22},
      ...days.map(()=>({wch:8})),
      {wch:10}, {wch:15}
    ];
    XLSX.utils.book_append_sheet(wb, ws, cls.substring(0,31));
  });

  XLSX.writeFile(wb, `DiemDanh_T${m}_${y}.xlsx`);
  showToast('✅ Đã xuất file Excel!');
}

function getPeriodKeyFor(m, y) { return `${y}-${m}`; }

// ===== MODALS =====
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(el => {
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('open'); });
});

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== KEYBOARD: gõ x trực tiếp =====
document.addEventListener('keydown', e => {
  if (['x','X'].includes(e.key) && document.activeElement.classList.contains('att-btn')) {
    document.activeElement.click();
  }
});

// ===== INIT =====
loadState();
if (!state.activeClass || !state.classes[state.activeClass]) {
  state.activeClass = Object.keys(state.classes)[0];
}
rebuild();
renderTabs();
</script>
</body>
</html>
