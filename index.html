<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm Danh Học Hè</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --card: #1e2130;
  --card-hover: #252839;
  --border: rgba(255,255,255,0.08);
  --text: #f0f2f8;
  --muted: #7c88a3;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;
  --accent5: #38b2ac;
  --accent6: #ed64a6;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 16px;
}

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── DASHBOARD ── */
#dashView {
  min-height: 100vh;
  padding: 0 0 60px;
}

.dash-header {
  background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 40px 28px;
  position: relative;
  overflow: hidden;
}
.dash-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.dash-header h1 {
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}
.dash-header .sub {
  color: var(--muted); font-size: 14px; margin-top: 6px;
}
.dash-meta {
  display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap;
}
.dash-meta select, .dash-meta input[type=number] {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-family: inherit;
  outline: none; cursor: pointer;
}
.dash-meta select:focus, .dash-meta input:focus {
  border-color: var(--accent);
}
.dash-meta label {
  font-size: 12px; color: var(--muted); font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; gap: 6px;
}

/* GRID */
.classes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 32px 40px;
}

.class-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background 0.18s;
  position: relative;
  overflow: hidden;
}
.class-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent, var(--accent));
  border-radius: var(--radius) var(--radius) 0 0;
  transition: height 0.18s;
}
.class-card:hover {
  transform: translateY(-4px);
  background: var(--card-hover);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  border-color: rgba(255,255,255,0.15);
}
.class-card:hover::before { height: 4px; }

.card-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  background: var(--card-accent-bg, rgba(108,99,255,0.15));
  margin-bottom: 16px;
}
.card-name {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.card-schedule {
  font-size: 12px; color: var(--muted); margin-bottom: 16px;
  display: flex; align-items: center; gap: 6px;
}
.card-schedule .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--card-accent, var(--accent));
  flex-shrink: 0;
}
.card-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-top: 16px;
}
.stat-box {
  background: rgba(255,255,255,0.04);
  border-radius: 10px; padding: 10px 12px;
}
.stat-box .val {
  font-size: 20px; font-weight: 800; color: var(--text);
}
.stat-box .lbl {
  font-size: 11px; color: var(--muted); margin-top: 2px;
  font-weight: 500;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.card-footer .enter-btn {
  font-size: 12px; font-weight: 600;
  color: var(--card-accent, var(--accent));
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  padding: 0; font-family: inherit;
  transition: gap 0.15s;
}
.class-card:hover .enter-btn { gap: 8px; }
.card-del {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 14px; padding: 4px;
  border-radius: 6px; transition: color 0.15s, background 0.15s;
}
.card-del:hover { color: var(--accent2); background: rgba(255,101,132,0.1); }

/* ADD CARD */
.class-card.add-card {
  border: 2px dashed rgba(255,255,255,0.12);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 220px; color: var(--muted);
  background: transparent;
  gap: 12px;
}
.class-card.add-card:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(108,99,255,0.06);
  transform: translateY(-4px);
}
.class-card.add-card::before { display: none; }
.add-card .plus {
  width: 52px; height: 52px; border-radius: 14px;
  border: 2px dashed currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; transition: transform 0.18s;
}
.class-card.add-card:hover .plus { transform: rotate(90deg); }
.add-card span { font-size: 14px; font-weight: 600; }

/* ── DETAIL VIEW ── */
#detailView { display: none; min-height: 100vh; }

.detail-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.back-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.12); }
.detail-title { font-size: 18px; font-weight: 700; flex: 1; }
.detail-schedule-badge {
  font-size: 12px; padding: 5px 12px; border-radius: 20px;
  font-weight: 600; background: rgba(108,99,255,0.15); color: #a5b4fc;
}
.detail-actions { display: flex; gap: 8px; }

.btn {
  padding: 8px 16px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: inherit; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #5a52d5; transform: translateY(-1px); }
.btn-green { background: var(--accent3); color: #0a2a17; }
.btn-green:hover { background: #35c96a; }
.btn-outline {
  background: rgba(255,255,255,0.06); color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
.btn-danger {
  background: rgba(255,101,132,0.12); color: var(--accent2);
  border: 1px solid rgba(255,101,132,0.2);
}
.btn-danger:hover { background: rgba(255,101,132,0.25); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.detail-toolbar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.detail-toolbar label { font-size: 12px; color: var(--muted); font-weight: 600; }
.detail-toolbar input[type=number] {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 6px 10px;
  font-size: 13px; font-family: inherit; outline: none; width: 100px;
}
.detail-toolbar input:focus { border-color: var(--accent); }
.sync-badge {
  margin-left: auto; font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 8px;
}
.sync-badge.ok { background: rgba(67,233,123,0.15); color: #43e97b; }
.sync-badge.off { background: rgba(255,255,255,0.05); color: var(--muted); }
.sync-badge.error { background: rgba(255,101,132,0.15); color: var(--accent2); }
.sync-badge.syncing { background: rgba(247,151,30,0.15); color: var(--accent4); }

.detail-main { padding: 24px 28px; }
.detail-info {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
  align-items: center;
}
.info-chip {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; font-size: 12px; color: var(--muted);
}
.info-chip strong { color: var(--text); }

.table-wrap {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow-x: auto;
}
table { border-collapse: collapse; width: 100%; min-width: max-content; }

thead tr:first-child th {
  background: rgba(255,255,255,0.04);
  color: var(--muted); font-size: 11px; font-weight: 700;
  padding: 14px 10px; text-align: center;
  letter-spacing: 0.5px; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
thead tr:first-child th:nth-child(2) { text-align: left; padding-left: 16px; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.03); }

td { padding: 10px 6px; font-size: 13px; vertical-align: middle; }
td:first-child { text-align: center; color: var(--muted); font-size: 12px; width: 44px; }
td:nth-child(2) { min-width: 160px; padding-left: 16px; font-weight: 500; }

/* Attendance cell */
td.att-cell { text-align: center; min-width: 40px; padding: 4px 2px; }
.att-btn {
  width: 32px; height: 28px; border-radius: 7px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: transparent; cursor: pointer; font-size: 13px;
  font-weight: 800; color: transparent;
  transition: all 0.12s; display: flex;
  align-items: center; justify-content: center; margin: 0 auto;
}
.att-btn:hover:not(.checked) {
  background: rgba(67,233,123,0.1); border-color: rgba(67,233,123,0.4);
}
.att-btn.checked {
  background: rgba(255,101,132,0.15); border-color: rgba(255,101,132,0.5);
  color: var(--accent2); font-size: 12px;
}

td.total-cell {
  text-align: center; font-weight: 800; color: #7dd3fc;
  font-size: 15px; min-width: 56px;
}
td.fee-cell {
  text-align: right; font-weight: 700; color: var(--accent3);
  font-size: 13px; padding-right: 18px; min-width: 110px; white-space: nowrap;
}
td.day-label {
  text-align: center; font-size: 10px; color: var(--muted);
  line-height: 1.3; min-width: 40px; padding: 8px 2px;
  font-weight: 600;
}
.day-name { display: block; color: var(--text); font-size: 11px; }

tfoot tr td {
  background: rgba(255,255,255,0.03);
  border-top: 1px solid var(--border);
  color: var(--muted); font-weight: 700;
  font-size: 12px; padding: 12px 6px; letter-spacing: 0.5px;
}
tfoot td.total-cell { color: #7dd3fc; font-size: 15px; }
tfoot td.fee-cell { color: var(--accent3); padding-right: 18px; }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; width: 380px;
  max-width: 95vw; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.modal input, .modal select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: 10px; padding: 10px 14px;
  font-size: 13px; font-family: inherit; outline: none; margin-bottom: 12px;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;
}

.student-list {
  max-height: 200px; overflow-y: auto; margin-bottom: 12px;
  border: 1px solid var(--border); border-radius: 10px;
}
.student-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.student-item:last-child { border-bottom: none; }
.student-item:nth-child(even) { background: rgba(255,255,255,0.02); }

/* Schedule picker */
.schedule-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-bottom: 12px;
}
.day-toggle {
  background: var(--bg2); border: 1.5px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 8px 4px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  text-align: center; transition: all 0.12s; font-family: inherit;
}
.day-toggle.sel {
  background: rgba(108,99,255,0.2); border-color: var(--accent);
  color: var(--accent);
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 12px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 300;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── EMPTY ── */
.empty-state {
  text-align: center; padding: 64px 24px; color: var(--muted);
}
.empty-state .icon { font-size: 52px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

@media (max-width: 640px) {
  .classes-grid { padding: 20px 16px; }
  .dash-header { padding: 24px 16px; }
  .detail-main { padding: 16px; }
  .detail-header { padding: 12px 16px; }
  .detail-toolbar { padding: 10px 16px; }
}
</style>
</head>
<body>

<!-- ══════════ DASHBOARD ══════════ -->
<div id="dashView">
  <div class="dash-header">
    <h1>📚 Điểm Danh Học Hè</h1>
    <p class="sub">Chọn lớp để xem và điểm danh</p>
    <div class="dash-meta">
      <label>THÁNG
        <select id="selMonth" onchange="rebuild()">
          <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
          <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
          <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
          <option value="7" selected>Tháng 7</option><option value="8">Tháng 8</option>
          <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
          <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
        </select>
      </label>
      <label>NĂM
        <input type="number" id="selYear" value="2026" min="2020" max="2100" onchange="rebuild()" style="width:80px">
      </label>
    </div>
  </div>
  <div class="classes-grid" id="classesGrid"></div>
</div>

<!-- ══════════ DETAIL VIEW ══════════ -->
<div id="detailView">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Danh sách lớp</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-schedule-badge" id="detailScheduleBadge"></div>
    <div class="detail-actions">
      <button class="btn btn-outline btn-sm" onclick="openStudentsModal()">👥 Học sinh</button>
      <button class="btn btn-accent btn-sm" onclick="exportExcel()">⬇ Excel</button>
    </div>
  </div>
  <div class="detail-toolbar">
    <label style="font-size:12px;color:var(--muted);font-weight:600;">HỌC PHÍ/BUỔI</label>
    <input type="number" id="selGia" value="25000" step="1000" onchange="renderTable()">
    <span style="font-size:13px;color:var(--muted)">đ</span>
    <button class="btn btn-outline btn-sm" onclick="markAllToday()">✓ Điểm danh hôm nay</button>
    <button class="btn btn-danger btn-sm" onclick="resetClassAttendance()">♻️ Xoá điểm danh</button>
    <span id="syncStatus" class="sync-badge off">⚪ Chưa cấu hình đồng bộ</span>
  </div>
  <div class="detail-main">
    <div class="detail-info" id="detailInfoBar"></div>
    <div class="table-wrap">
      <table id="attTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</div>

<!-- Modal thêm lớp -->
<div class="modal-bg" id="modalClass">
  <div class="modal">
    <h3>➕ Thêm lớp mới</h3>
    <input type="text" id="newClassName" placeholder="Tên lớp (vd: Lớp 5, Lớp Nâng Cao...)">
    <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:0.4px;">NGÀY HỌC TRONG TUẦN</div>
    <div class="schedule-grid" id="dayToggles">
      <button class="day-toggle" data-d="1">T2</button>
      <button class="day-toggle" data-d="2">T3</button>
      <button class="day-toggle" data-d="3">T4</button>
      <button class="day-toggle" data-d="4">T5</button>
      <button class="day-toggle" data-d="5">T6</button>
      <button class="day-toggle" data-d="6">T7</button>
      <button class="day-toggle" data-d="0">CN</button>
    </div>
    <input type="text" id="newClassTime" placeholder="Giờ học (vd: 8h-10h, tùy chọn)">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalClass')">Huỷ</button>
      <button class="btn btn-accent" onclick="addClass()">Thêm lớp</button>
    </div>
  </div>
</div>

<!-- Modal quản lý học sinh -->
<div class="modal-bg" id="modalStudents">
  <div class="modal">
    <h3 id="modalStudentsTitle">👥 Quản lý học sinh</h3>
    <div class="student-list" id="studentList"></div>
    <input type="text" id="newStudentName" placeholder="Tên học sinh mới..."
      onkeydown="if(event.key==='Enter')addStudent()">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalStudents')">Đóng</button>
      <button class="btn btn-accent" onclick="addStudent()">➕ Thêm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzfci9y_GufuEfYJRHyYCBj95dEZUSfWKEQZv8I3_Re4iFxXHKSIj8dq-_CJP2vrPqBGg/exec";

// Màu accent cho từng lớp (xoay vòng)
const CARD_COLORS = [
  { accent: '#6c63ff', bg: 'rgba(108,99,255,0.15)', icon: '📖' },
  { accent: '#43e97b', bg: 'rgba(67,233,123,0.15)', icon: '✏️' },
  { accent: '#f7971e', bg: 'rgba(247,151,30,0.15)',  icon: '🌟' },
  { accent: '#ff6584', bg: 'rgba(255,101,132,0.15)', icon: '🎯' },
  { accent: '#38b2ac', bg: 'rgba(56,178,172,0.15)',  icon: '💡' },
  { accent: '#ed64a6', bg: 'rgba(237,100,166,0.15)', icon: '🚀' },
];

// Cấu trúc lớp: name, days (số nguyên: 0=CN,1=T2..6=T7), time
const DEFAULT_CLASSES_META = [
  { name: "Lớp 1A", days: [1,3,5], time: "",        students: ["Thịnh","Từ Minh Quân","Thiên Khôi","Tiger (Minh Trí)","Thiên Thư","Minh Triết","Thiên Trí","Khánh Linh","Thiên Quang"] },
  { name: "Lớp 1",  days: [2,4,6], time: "9h-11h",  students: [] },
  { name: "Lớp 2",  days: [2,4,6], time: "",         students: [] },
  { name: "Lớp 3",  days: [1,3,5], time: "",         students: ["Hoàng Khang","Thanh Hà","YSENNY","Jenny","Thiên Kỳ","Quỳnh Như","Triều Phong","Thúy Kiều","Yến My"] },
  { name: "Lớp 4",  days: [2,3,4], time: "",         students: [] },
];

// ===== STATE =====
let state = {
  classesMeta: {}, // { name: { days, time } }
  classes: {},     // { name: [students] }
  attendance: {},
  activeClass: null,
  days: [],
};
let lastLocalEditAt = 0;
let flushTimer = null;
let dirFlushTimer = null;

// ===== PERSIST =====
function loadState() {
  try {
    const saved = localStorage.getItem('hocHe_v2');
    if (saved) {
      const p = JSON.parse(saved);
      state.classesMeta = p.classesMeta || {};
      state.classes = p.classes || {};
      state.attendance = p.attendance || {};
      // migrate nếu chưa có meta
      Object.keys(state.classes).forEach(n => {
        if (!state.classesMeta[n]) {
          state.classesMeta[n] = { days: [1,3,5], time: '' };
        }
      });
    } else {
      // seed defaults
      DEFAULT_CLASSES_META.forEach(c => {
        state.classesMeta[c.name] = { days: c.days, time: c.time };
        state.classes[c.name] = [...c.students];
      });
    }
    migrateOldFormat();
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('hocHe_v2', JSON.stringify({
      classesMeta: state.classesMeta,
      classes: state.classes,
      attendance: state.attendance
    }));
  } catch(e) {}
}
function migrateOldFormat() {
  // migrate old numeric keys to name-based
  Object.keys(state.attendance).forEach(cls => {
    const students = state.classes[cls] || [];
    Object.keys(state.attendance[cls] || {}).forEach(pk => {
      const pd = state.attendance[cls][pk];
      const keys = Object.keys(pd);
      if (keys.length && keys.every(k => /^\d+$/.test(k))) {
        const m = {};
        keys.forEach(k => { const n = students[parseInt(k)]; if(n) m[n] = pd[k]; });
        state.attendance[cls][pk] = m;
      }
    });
  });
}

// ===== HELPERS =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getClassColor(name) {
  const names = Object.keys(state.classes);
  return CARD_COLORS[names.indexOf(name) % CARD_COLORS.length];
}
function dayName(d) { return ['CN','T2','T3','T4','T5','T6','T7'][d]; }
function fmtDate(dt) {
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
}
function fmtKey(dt) { return dt.toISOString().slice(0,10); }
function getPeriodKey() {
  return `${document.getElementById('selYear').value}-${document.getElementById('selMonth').value}`;
}

function getSchoolDays(year, month, allowedDays) {
  const days = [];
  const d = new Date(year, month-1, 1);
  while (d.getMonth() === month-1) {
    if (allowedDays.includes(d.getDay())) days.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return days;
}

// ===== ATTENDANCE =====
function getAtt(cls, name, dk) {
  const k = getPeriodKey();
  return !!(state.attendance[cls]?.[k]?.[name]?.[dk]);
}
function setAtt(cls, name, dk, val) {
  const k = getPeriodKey();
  if (!state.attendance[cls]) state.attendance[cls] = {};
  if (!state.attendance[cls][k]) state.attendance[cls][k] = {};
  if (!state.attendance[cls][k][name]) state.attendance[cls][k][name] = {};
  state.attendance[cls][k][name][dk] = val;
  saveState();
  lastLocalEditAt = Date.now();
  scheduleFlush(cls, k);
}
function countAtt(cls, name) {
  const k = getPeriodKey();
  if (!state.attendance[cls]?.[k]?.[name]) return 0;
  return Object.values(state.attendance[cls][k][name]).filter(Boolean).length;
}

document.getElementById('tbody').addEventListener('click', e => {
  const btn = e.target.closest('.att-btn');
  if (!btn) return;
  const cur = getAtt(state.activeClass, btn.dataset.name, btn.dataset.date);
  setAtt(state.activeClass, btn.dataset.name, btn.dataset.date, !cur);
  renderTable();
});

// ===== DATES for active class =====
function rebuildDays() {
  if (!state.activeClass) return;
  const m = parseInt(document.getElementById('selMonth').value);
  const y = parseInt(document.getElementById('selYear').value);
  const meta = state.classesMeta[state.activeClass] || { days: [1,3,5] };
  state.days = getSchoolDays(y, m, meta.days);
}

function rebuild() {
  rebuildDays();
  renderDashboard();
  if (state.activeClass) renderTable();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const grid = document.getElementById('classesGrid');
  const m = parseInt(document.getElementById('selMonth').value);
  const y = parseInt(document.getElementById('selYear').value);
  const classNames = Object.keys(state.classes);
  grid.innerHTML = '';
  classNames.forEach(name => {
    const col = getClassColor(name);
    const meta = state.classesMeta[name] || { days:[1,3,5], time:'' };
    const students = state.classes[name];
    const days = getSchoolDays(y, m, meta.days);
    const totalAbsences = students.reduce((s, n) => {
      const k = `${y}-${m}`;
      const pd = state.attendance[name]?.[k]?.[n] || {};
      return s + Object.values(pd).filter(Boolean).length;
    }, 0);
    const scheduleLabel = meta.days.map(d=>dayName(d)).join(', ')
      + (meta.time ? ` · ${meta.time}` : '');

    const card = document.createElement('div');
    card.className = 'class-card';
    card.style.setProperty('--card-accent', col.accent);
    card.style.setProperty('--card-accent-bg', col.bg);
    card.innerHTML = `
      <div class="card-icon">${col.icon}</div>
      <div class="card-name">${escapeHtml(name)}</div>
      <div class="card-schedule">
        <span class="dot"></span>
        ${escapeHtml(scheduleLabel || 'Chưa cấu hình lịch')}
      </div>
      <div class="card-stats">
        <div class="stat-box">
          <div class="val">${students.length}</div>
          <div class="lbl">Học sinh</div>
        </div>
        <div class="stat-box">
          <div class="val">${days.length}</div>
          <div class="lbl">Buổi học</div>
        </div>
        <div class="stat-box">
          <div class="val">${totalAbsences}</div>
          <div class="lbl">Tổng điểm danh</div>
        </div>
        <div class="stat-box">
          <div class="val">${students.length * days.length > 0 ? Math.round(totalAbsences / (students.length * days.length) * 100) : 0}%</div>
          <div class="lbl">Tỉ lệ có mặt</div>
        </div>
      </div>
      <div class="card-footer">
        <button class="enter-btn">Mở bảng điểm danh →</button>
        <button class="card-del" title="Xoá lớp" onclick="event.stopPropagation();confirmDeleteClass('${escapeHtml(name)}')">🗑</button>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.closest('.card-del')) return;
      openClass(name);
    });
    grid.appendChild(card);
  });

  // Add card
  const addCard = document.createElement('div');
  addCard.className = 'class-card add-card';
  addCard.innerHTML = `<div class="plus">+</div><span>Thêm lớp mới</span>`;
  addCard.onclick = () => openAddClassModal();
  grid.appendChild(addCard);
}

// ===== OPEN CLASS =====
function openClass(name) {
  state.activeClass = name;
  rebuildDays();
  const col = getClassColor(name);
  const meta = state.classesMeta[name] || {};
  document.getElementById('detailTitle').textContent = name;
  document.getElementById('detailScheduleBadge').textContent =
    (meta.days||[]).map(d=>dayName(d)).join(', ') + (meta.time ? ` · ${meta.time}` : '');
  document.getElementById('detailScheduleBadge').style.background = col.bg;
  document.getElementById('detailScheduleBadge').style.color = col.accent;
  document.getElementById('dashView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  updateSyncBadge();
  renderTable();
}
function goBack() {
  state.activeClass = null;
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('dashView').style.display = 'block';
  rebuild();
}

// ===== RENDER TABLE =====
function renderTable() {
  const cls = state.activeClass;
  const students = state.classes[cls] || [];
  const gia = parseInt(document.getElementById('selGia').value) || 25000;
  const days = state.days;

  document.getElementById('detailInfoBar').innerHTML = `
    <div class="info-chip">📅 <strong>${days.length} buổi</strong> tháng này</div>
    <div class="info-chip">👥 <strong>${students.length} học sinh</strong></div>
    <div class="info-chip">💰 <strong>${gia.toLocaleString('vi-VN')}đ</strong>/buổi</div>
  `;

  // Header
  const thead = document.getElementById('thead');
  let hRow = `<tr>
    <th>#</th>
    <th style="text-align:left;padding-left:16px">HỌ VÀ TÊN</th>`;
  days.forEach(d => {
    hRow += `<th class="day-label">
      <span class="day-name">${['CN','T2','T3','T4','T5','T6','T7'][d.getDay()]}</span>
      ${fmtDate(d)}
    </th>`;
  });
  hRow += `<th>TỔNG</th><th style="text-align:right;padding-right:18px">HỌC PHÍ</th></tr>`;
  thead.innerHTML = hRow;

  const tbody = document.getElementById('tbody');
  if (students.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${3+days.length}">
      <div class="empty-state"><div class="icon">👤</div>
      <h3>Chưa có học sinh</h3>
      <p>Nhấn "Học sinh" để thêm vào lớp</p></div>
    </td></tr>`;
    document.getElementById('tfoot').innerHTML = '';
    return;
  }

  tbody.innerHTML = students.map((name, si) => {
    const total = countAtt(cls, name);
    const fee = total * gia;
    const cells = days.map(d => {
      const dk = fmtKey(d);
      const checked = getAtt(cls, name, dk);
      return `<td class="att-cell">
        <button class="att-btn ${checked?'checked':''}"
          data-name="${escapeHtml(name)}" data-date="${dk}">
          ${checked ? '✕' : ''}
        </button></td>`;
    }).join('');
    return `<tr>
      <td>${si+1}</td>
      <td>${escapeHtml(name)}</td>
      ${cells}
      <td class="total-cell">${total}</td>
      <td class="fee-cell">${fee.toLocaleString('vi-VN')}đ</td>
    </tr>`;
  }).join('');

  const totalD = students.reduce((s,n) => s + countAtt(cls,n), 0);
  const totalF = students.reduce((s,n) => s + countAtt(cls,n)*gia, 0);
  const blanks = days.map(()=>'<td></td>').join('');
  document.getElementById('tfoot').innerHTML = `<tr>
    <td colspan="2" style="text-align:right;padding-right:10px;letter-spacing:0.5px">TỔNG CỘNG</td>
    ${blanks}
    <td class="total-cell">${totalD}</td>
    <td class="fee-cell">${totalF.toLocaleString('vi-VN')}đ</td>
  </tr>`;
}

// ===== MARK ALL TODAY =====
function markAllToday() {
  const today = new Date();
  const dk = fmtKey(today);
  const found = state.days.find(d => fmtKey(d) === dk);
  if (!found) { showToast('Hôm nay không có buổi học'); return; }
  const cls = state.activeClass;
  state.classes[cls].forEach(name => setAtt(cls, name, dk, true));
  renderTable();
  showToast(`✅ Đã điểm danh ${state.classes[cls].length} học sinh`);
}

// ===== ADD CLASS =====
function openAddClassModal() {
  document.getElementById('newClassName').value = '';
  document.getElementById('newClassTime').value = '';
  document.querySelectorAll('.day-toggle').forEach(b => b.classList.remove('sel'));
  document.getElementById('modalClass').classList.add('open');
}
document.getElementById('dayToggles').addEventListener('click', e => {
  const btn = e.target.closest('.day-toggle');
  if (btn) btn.classList.toggle('sel');
});
function addClass() {
  const name = document.getElementById('newClassName').value.trim();
  if (!name) return;
  if (state.classes[name]) { showToast('⚠️ Lớp đã tồn tại!'); return; }
  const selectedDays = [...document.querySelectorAll('.day-toggle.sel')].map(b => parseInt(b.dataset.d));
  if (selectedDays.length === 0) { showToast('⚠️ Chọn ít nhất 1 ngày học!'); return; }
  const time = document.getElementById('newClassTime').value.trim();
  state.classes[name] = [];
  state.classesMeta[name] = { days: selectedDays, time };
  closeModal('modalClass');
  saveState();
  rebuild();
  scheduleDirectoryFlush();
  showToast(`✅ Đã thêm lớp "${name}"`);
}

function confirmDeleteClass(name) {
  if (Object.keys(state.classes).length <= 1) { showToast('Phải có ít nhất 1 lớp!'); return; }
  if (!confirm(`Xoá lớp "${name}"? Dữ liệu điểm danh sẽ mất.`)) return;
  delete state.classes[name];
  delete state.classesMeta[name];
  delete state.attendance[name];
  saveState();
  renderDashboard();
  scheduleDirectoryFlush();
  deleteClassOnSheet(name);
  showToast(`🗑 Đã xoá lớp "${name}"`);
}

function resetClassAttendance() {
  const cls = state.activeClass;
  if (!confirm(`Xoá toàn bộ điểm danh lớp "${cls}"?`)) return;
  delete state.attendance[cls];
  saveState();
  renderTable();
  scheduleFlush(cls, getPeriodKey());
  showToast(`✅ Đã xoá điểm danh lớp "${cls}"`);
}

// ===== STUDENTS =====
function openStudentsModal() {
  document.getElementById('modalStudentsTitle').textContent = `👥 Học sinh – ${state.activeClass}`;
  renderStudentList();
  document.getElementById('modalStudents').classList.add('open');
}
function renderStudentList() {
  const s = state.classes[state.activeClass];
  const list = document.getElementById('studentList');
  if (!s.length) {
    list.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--muted)">Chưa có học sinh</div>';
    return;
  }
  list.innerHTML = s.map((n,i) => `
    <div class="student-item">
      <span>${i+1}. ${escapeHtml(n)}</span>
      <button class="btn btn-danger btn-sm" onclick="removeStudent(${i})">✕</button>
    </div>`).join('');
}
function addStudent() {
  const inp = document.getElementById('newStudentName');
  const name = inp.value.trim();
  if (!name) return;
  if (state.classes[state.activeClass].includes(name)) {
    showToast('⚠️ Tên này đã có trong lớp!'); return;
  }
  state.classes[state.activeClass].push(name);
  inp.value = '';
  saveState();
  renderStudentList();
  renderTable();
  scheduleDirectoryFlush();
}
function removeStudent(idx) {
  const cls = state.activeClass;
  const name = state.classes[cls][idx];
  if (!confirm(`Xoá học sinh "${name}"?`)) return;
  state.classes[cls].splice(idx, 1);
  if (state.attendance[cls]) {
    Object.keys(state.attendance[cls]).forEach(pk => {
      delete state.attendance[cls][pk][name];
    });
  }
  saveState();
  renderStudentList();
  renderTable();
  scheduleDirectoryFlush();
}

// ===== EXPORT EXCEL =====
function buildPeriodRows(cls, year, month) {
  const students = state.classes[cls] || [];
  const meta = state.classesMeta[cls] || { days:[1,3,5] };
  const days = getSchoolDays(year, month, meta.days);
  const gia = parseInt(document.getElementById('selGia').value) || 25000;
  const pk = `${year}-${month}`;
  const header = ['STT','Họ và Tên', ...days.map(d=>`${['CN','T2','T3','T4','T5','T6','T7'][d.getDay()]} ${fmtDate(d)}`), 'Tổng','Học Phí'];
  const rows = students.map((name,si) => {
    const pd = state.attendance[cls]?.[pk]?.[name] || {};
    let total = 0;
    const cells = days.map(d => { const v = !!pd[fmtKey(d)]; if(v) total++; return v?'x':''; });
    return [si+1, name, ...cells, total, total*gia];
  });
  return { header, rows, days };
}
function exportExcel() {
  const m = parseInt(document.getElementById('selMonth').value);
  const y = parseInt(document.getElementById('selYear').value);
  const wb = XLSX.utils.book_new();
  Object.keys(state.classes).forEach(cls => {
    const { header, rows, days } = buildPeriodRows(cls, y, m);
    const totalRow = ['','TỔNG CỘNG', ...days.map(()=>''),
      rows.reduce((s,r)=>s+r[r.length-2],0),
      rows.reduce((s,r)=>s+r[r.length-1],0)];
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows, totalRow]);
    ws['!cols'] = [{wch:5},{wch:22},...days.map(()=>({wch:8})),{wch:8},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, cls.substring(0,31));
  });
  XLSX.writeFile(wb, `DiemDanh_T${m}_${y}.xlsx`);
  showToast('✅ Đã xuất Excel!');
}

// ===== SYNC: helpers chung =====
function isSyncEnabled() {
  return !!(SHEET_API_URL && SHEET_API_URL.trim());
}
function updateSyncBadge(status) {
  // status: undefined (idle dựa theo config) | 'syncing' | 'ok' | 'error'
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (!isSyncEnabled()) {
    el.className = 'sync-badge off';
    el.textContent = '⚪ Chưa cấu hình đồng bộ';
    return;
  }
  if (status === 'syncing') {
    el.className = 'sync-badge syncing';
    el.textContent = '🟡 Đang đồng bộ...';
  } else if (status === 'error') {
    el.className = 'sync-badge error';
    el.textContent = '🔴 Lỗi đồng bộ';
  } else {
    el.className = 'sync-badge ok';
    el.textContent = '🟢 Đã đồng bộ Google Sheet';
  }
}

// ===== SYNC: tải dữ liệu từ Sheet khi mở trang =====
async function loadFromSheet() {
  if (!isSyncEnabled()) return;
  try {
    updateSyncBadge('syncing');
    const res = await fetch(`${SHEET_API_URL}?action=getAll`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Chỉ áp dụng dữ liệu từ Sheet nếu local chưa có gì (tránh đè mất dữ liệu đang sửa)
    const hasLocalClasses = Object.keys(state.classes).length > 0;
    if (data.classes && Object.keys(data.classes).length > 0) {
      if (!hasLocalClasses) {
        state.classes = data.classes;
        Object.keys(state.classes).forEach(n => {
          if (!state.classesMeta[n]) state.classesMeta[n] = { days: [1,3,5], time: '' };
        });
      }
    }
    if (data.attendance) {
      // merge: dữ liệu Sheet là nguồn "đã lưu", merge vào local nếu local chưa có period đó
      Object.keys(data.attendance).forEach(cls => {
        if (!state.attendance[cls]) state.attendance[cls] = {};
        Object.keys(data.attendance[cls]).forEach(pk => {
          if (!state.attendance[cls][pk]) {
            state.attendance[cls][pk] = data.attendance[cls][pk];
          }
        });
      });
    }
    saveState();
    rebuild();
    updateSyncBadge('ok');
  } catch (err) {
    console.error('Lỗi tải dữ liệu từ Sheet:', err);
    updateSyncBadge('error');
  }
}

// ===== SYNC: gửi điểm danh của 1 lớp/kỳ lên Sheet =====
function scheduleFlush(cls, pk) {
  if (!isSyncEnabled()) return;
  clearTimeout(flushTimer);
  flushTimer = setTimeout(() => flushToSheet(cls, pk), 800);
}
async function flushToSheet(cls, pk) {
  if (!isSyncEnabled()) return;
  try {
    updateSyncBadge('syncing');
    const [year, month] = pk.split('-').map(Number);
    const { header, rows } = buildPeriodRows(cls, year, month);
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'saveClassPeriod',
        className: cls,
        periodKey: pk,
        headerRow: header,
        rows: rows
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    updateSyncBadge('ok');
  } catch (err) {
    console.error('Lỗi đồng bộ điểm danh:', err);
    updateSyncBadge('error');
  }
}

// ===== SYNC: gửi danh sách lớp/học sinh lên Sheet =====
function scheduleDirectoryFlush() {
  if (!isSyncEnabled()) return;
  clearTimeout(dirFlushTimer);
  dirFlushTimer = setTimeout(flushDirectoryToSheet, 800);
}
async function flushDirectoryToSheet() {
  if (!isSyncEnabled()) return;
  try {
    updateSyncBadge('syncing');
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'saveDirectory',
        classes: state.classes
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    updateSyncBadge('ok');
  } catch (err) {
    console.error('Lỗi đồng bộ danh sách lớp:', err);
    updateSyncBadge('error');
  }
}

// ===== SYNC: xoá lớp trên Sheet =====
async function deleteClassOnSheet(className) {
  if (!isSyncEnabled()) return;
  try {
    updateSyncBadge('syncing');
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'deleteClass', className })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    updateSyncBadge('ok');
  } catch (err) {
    console.error('Lỗi xoá lớp trên Sheet:', err);
    updateSyncBadge('error');
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (['x','X'].includes(e.key) && document.activeElement.classList.contains('att-btn')) {
    document.activeElement.click();
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open'));
  }
});

// ===== INIT =====
loadState();
rebuild();
loadFromSheet();
</script>
</body>
